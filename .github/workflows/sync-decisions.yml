name: Distribute decisions from Confluence

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  load-subscribers:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Read subscriber list
        id: read
        run: |
          matrix=$(python3 -c "
          import yaml, json
          with open('.github/decisions-subscribers.yml') as f:
              data = yaml.safe_load(f)
          include = [
              {'role': role, 'repo': repo}
              for role, repos in data.get('subscriptions', {}).items()
              for repo in repos
          ]
          print(json.dumps({'include': include}))
          ")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  sync:
    needs: load-subscribers
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.load-subscribers.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout NXD-Solutions/.github (scripts)
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Checkout subscriber repo
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.REPOS_PAT }}
          path: subscriber

      - name: Run sync script
        working-directory: subscriber
        env:
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: $GITHUB_WORKSPACE/node_modules/.bin/tsx $GITHUB_WORKSPACE/scripts/sync-decisions.ts --role ${{ matrix.role }}

      - name: Check for changes
        id: changes
        run: |
          if [ -z "$(git -C subscriber status --porcelain -- .claude/rules/)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "## ✅ Nothing new to sync — \`.claude/rules/decisions-${{ matrix.role }}.md\` is already up to date in \`${{ matrix.repo }}\`." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR if file changed
        if: steps.changes.outputs.changed == 'true'
        id: open-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.REPOS_PAT }}
          path: subscriber
          branch: automated/update-${{ matrix.role }}-ai-coding-rules
          base: main
          delete-branch: true
          add-paths: .claude/rules/
          commit-message: "Update ${{ matrix.role }} AI coding rules from NXD Decision Log"
          title: "automated: Update ${{ matrix.role }} AI coding rules from NXD Decision Log"
          body: |
            Auto-generated by the **Distribute decisions from Confluence** workflow in `NXD-Solutions/.github`.

            Regenerates `.claude/rules/decisions-${{ matrix.role }}.md` from the `## AI Summary — ${{ matrix.role }}`
            sections on each NXD decision page in Confluence.

            Review the diff to confirm all constraints look correct, then merge.
          labels: chore

      - name: Report PR to summary
        if: steps.open-pr.outputs.pull-request-url != ''
        run: |
          echo "## 🔀 PR opened for \`${{ matrix.repo }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.open-pr.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"
