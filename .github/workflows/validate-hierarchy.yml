name: Validate DNA Hierarchy

on:
  pull_request:

jobs:
  validate-hierarchy-references:
    name: Validate hierarchy references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Explain process
        run: |
          {
            echo "## Validate DNA Hierarchy"
            echo ""
            echo "**Purpose**: Verify every node in \`.claude/hierarchy.md\` resolves to an existing file and heading."
            echo ""
            echo "**Process**:"
            echo "- *Validate hierarchy references* — parses the hierarchy tree and checks each linked file and heading exists"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Validate hierarchy references
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node scripts/validate-hierarchy.cjs