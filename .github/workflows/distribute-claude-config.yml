name: Distribute Claude Config

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Reject .local.md files in .claude-static
        run: |
          {
            echo "## Distribute Claude Config"
            echo ""
            echo "**Purpose**: Distribute \`.claude-static/**/*.md\` files to all subscribing repos."
            echo ""
            echo "**Process**:"
            echo "- *Preflight* — GitHub validates the workflow and prepares runners"
            echo "- *Load subscribers* — discovers all org repos, applies overrides, builds the sync matrix"
            echo "- *Sync* — runs in parallel per repo: updates decision-log extract, static rules, and PR template, opens a PR if anything changed"
          } >> "$GITHUB_STEP_SUMMARY"
          files=$(find .claude-static -name "*.local.md")
          if [ -n "$files" ]; then
            echo "## :x: .local.md violation" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "The following files must not be committed to \`.claude-static/\`:" >> "$GITHUB_STEP_SUMMARY"
            echo "$files" | while read f; do echo "- \`$f\`" >> "$GITHUB_STEP_SUMMARY"; done
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**How to fix:** \`.local.md\` files are repo-specific and must never be distributed." >> "$GITHUB_STEP_SUMMARY"
            echo "Remove the file from \`.claude-static/\` and keep it only in the target repo's \`.claude/rules/\`." >> "$GITHUB_STEP_SUMMARY"
            echo "$files"
            exit 1
          fi
          echo "✅ Preflight passed — no \`.local.md\` files found in \`.claude-static/\`." >> "$GITHUB_STEP_SUMMARY"

  load-subscribers:
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5

      - name: Discover repos and apply overrides
        id: build
        env:
          GH_TOKEN: ${{ secrets.REPOS_PAT }}
        run: |
          output=$(python3 -c "
          import yaml, json, subprocess

          with open('.github/claude-rules-overrides.yml') as f:
            config = yaml.safe_load(f) or {}
          overrides = config.get('overrides') or {}

          result = subprocess.run(
            ['gh', 'api', 'orgs/NXD-Solutions/repos', '--paginate', '--jq', '.[].full_name'],
            capture_output=True, text=True
          )
          repos = [r.strip() for r in result.stdout.strip().splitlines() if r.strip()]

          include = []
          excluded = 0
          for repo in repos:
            override = overrides.get(repo, {})
            if override.get('exclude'):
              excluded += 1
              continue
            role = override.get('role', 'Developer')
            include.append({'repo': repo, 'role': role})

          print(json.dumps({'matrix': {'include': include}, 'total': len(repos), 'excluded': excluded}))
          ")
          matrix=$(echo "$output" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d['matrix']))")
          total=$(echo "$output" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['total'])")
          excluded=$(echo "$output" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['excluded'])")
          subscribers=$((total - excluded))
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          {
            echo "**Subscribers:** $subscribers repos queued for sync ($excluded excluded by overrides — see \`.github/claude-rules-overrides.yml\`)"
          } >> "$GITHUB_STEP_SUMMARY"

  sync:
    needs: load-subscribers
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.load-subscribers.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout NXD-Solutions/.github (scripts)
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Checkout subscriber repo
        uses: actions/checkout@v5
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.REPOS_PAT }}
          path: subscriber

      - name: Run sync script
        working-directory: subscriber
        env:
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: $GITHUB_WORKSPACE/node_modules/.bin/tsx $GITHUB_WORKSPACE/scripts/sync-decisions.ts --role ${{ matrix.role }}

      - name: Copy static Claude rules
        run: |
          mkdir -p subscriber/.claude/rules/
          cp -r $GITHUB_WORKSPACE/.claude-static/rules/. subscriber/.claude/rules/

      - name: Copy static Claude commands
        run: |
          mkdir -p subscriber/.claude/commands/
          if compgen -G "$GITHUB_WORKSPACE/.claude-static/commands/*" > /dev/null 2>&1; then
            cp $GITHUB_WORKSPACE/.claude-static/commands/* subscriber/.claude/commands/
          fi

      - name: Copy PR template
        run: |
          mkdir -p subscriber/.github/
          cp $GITHUB_WORKSPACE/.github/PULL_REQUEST_TEMPLATE.md subscriber/.github/PULL_REQUEST_TEMPLATE.md

      - name: Check for changes
        id: changes
        run: |
          if [ -z "$(git -C subscriber status --porcelain -- .claude/rules/ .claude/commands/ .github/PULL_REQUEST_TEMPLATE.md)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✅ \`${{ matrix.repo }}\` — already up to date." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR if changed
        if: steps.changes.outputs.changed == 'true'
        id: open-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.REPOS_PAT }}
          path: subscriber
          branch: automated/update-ai-coding-rules
          base: main
          delete-branch: true
          add-paths: |
            .claude/rules/
            .claude/commands/
            .github/PULL_REQUEST_TEMPLATE.md
          commit-message: "Update AI coding rules from NXD Decision Log"
          title: "automated: Update AI coding rules from NXD Decision Log"
          body: |
            Auto-generated by the **Distribute Claude Config** workflow in `NXD-Solutions/.github`.

            Syncs `.claude/rules/` from `.claude-static/rules/`, `.claude/commands/` from `.claude-static/commands/`, and `.github/PULL_REQUEST_TEMPLATE.md`.

            Review the diff and merge.
          labels: chore

      - name: Report PR to summary
        if: steps.open-pr.outputs.pull-request-url != ''
        run: echo "${{ steps.open-pr.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"
