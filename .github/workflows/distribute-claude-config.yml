name: Distribute Claude Config

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      repo:
        description: 'Target repo (org/repo) — leave empty to sync all repos'
        required: false
        type: string

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Preflight
        run: |
          {
            echo "## Distribute Claude Config"
            echo ""
            echo "**Purpose**: Distribute DNA rules and commands from \`NXD-Solutions/dna\` to all subscribing repos."
            echo ""
            echo "**Process**:"
            echo "- *Preflight* — GitHub validates the workflow and prepares runners"
            echo "- *Load subscribers* — discovers all org repos, applies overrides, builds the sync matrix"
            echo "- *Sync* — runs in parallel per repo: updates decision-log extract, copies DNA rules/commands to \`.claude/rules/dna/\` and \`.claude/commands/dna/\`, removes old distribution paths, opens a PR if anything changed"
            echo ""
            echo "✅ Preflight passed."
          } >> "$GITHUB_STEP_SUMMARY"

  load-subscribers:
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5

      - name: Discover repos and apply overrides
        id: build
        env:
          GH_TOKEN: ${{ secrets.REPOS_PAT }}
          TARGET_REPO: ${{ inputs.repo }}
        run: |
          output=$(python3 -c "
          import yaml, json, subprocess, os

          with open('.github/claude-rules-overrides.yml') as f:
            config = yaml.safe_load(f) or {}
          overrides = config.get('overrides') or {}

          target = os.environ.get('TARGET_REPO', '').strip()

          if target:
            override = overrides.get(target, {})
            role = override.get('role', 'Developer')
            include = [{'repo': target, 'role': role}]
            print(json.dumps({'matrix': {'include': include}, 'total': 1, 'excluded': 0, 'targeted': True}))
          else:
            result = subprocess.run(
              ['gh', 'api', 'orgs/NXD-Solutions/repos', '--paginate', '--jq', '.[].full_name'],
              capture_output=True, text=True
            )
            repos = [r.strip() for r in result.stdout.strip().splitlines() if r.strip()]

            include = []
            excluded = 0
            for repo in repos:
              override = overrides.get(repo, {})
              if override.get('exclude'):
                excluded += 1
                continue
              role = override.get('role', 'Developer')
              include.append({'repo': repo, 'role': role})

            print(json.dumps({'matrix': {'include': include}, 'total': len(repos), 'excluded': excluded, 'targeted': False}))
          ")
          matrix=$(echo "$output" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d['matrix']))")
          total=$(echo "$output" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['total'])")
          excluded=$(echo "$output" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['excluded'])")
          targeted=$(echo "$output" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['targeted'])")
          subscribers=$((total - excluded))
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          if [ "$targeted" = "True" ]; then
            echo "**Target:** \`${{ inputs.repo }}\` (single-repo run)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Subscribers:** $subscribers repos queued for sync ($excluded excluded by overrides — see \`.github/claude-rules-overrides.yml\`)" >> "$GITHUB_STEP_SUMMARY"
          fi

  sync:
    needs: load-subscribers
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.load-subscribers.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout NXD-Solutions/.github (scripts and registry)
        uses: actions/checkout@v5

      - name: Checkout NXD-Solutions/dna (DNA source)
        uses: actions/checkout@v5
        with:
          repository: NXD-Solutions/dna
          token: ${{ secrets.REPOS_PAT }}
          path: dna

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Checkout subscriber repo
        uses: actions/checkout@v5
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.REPOS_PAT }}
          path: subscriber

      - name: Run sync script
        working-directory: subscriber
        env:
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: $GITHUB_WORKSPACE/node_modules/.bin/tsx $GITHUB_WORKSPACE/scripts/sync-decisions.ts --role ${{ matrix.role }}

      - name: Remove old DNA distribution paths from subscriber
        run: |
          # Rules: remove fully-distributed subdirectories from old locations
          for dir in thinking-core nxd-practices governance claude-code dev figma github confluence; do
            rm -rf "subscriber/.claude/rules/$dir"
          done
          # Rules/configuration: remove only previously-distributed files (preserve local files)
          while IFS= read -r -d '' f; do
            relative="${f#$GITHUB_WORKSPACE/dna/.claude-static/rules/configuration/}"
            rm -f "subscriber/.claude/rules/configuration/${relative}"
          done < <(find $GITHUB_WORKSPACE/dna/.claude-static/rules/configuration -type f -print0 2>/dev/null || true)
          # Commands: remove previously-distributed command files from old locations
          while IFS= read -r -d '' f; do
            relative="${f#$GITHUB_WORKSPACE/dna/.claude-static/commands/}"
            # Skip entries that belong to the new dna/ subfolder (no old location to remove)
            [[ "$relative" == dna/* ]] && continue
            rm -f "subscriber/.claude/commands/${relative}"
          done < <(find $GITHUB_WORKSPACE/dna/.claude-static/commands -type f -print0 2>/dev/null || true)
          # Remove empty dev/ directory if all distributed files were removed
          rmdir subscriber/.claude/commands/dev/ 2>/dev/null || true

      - name: Copy DNA rules to subscriber
        run: |
          mkdir -p subscriber/.claude/rules/dna/
          cp -r $GITHUB_WORKSPACE/dna/.claude-static/rules/. subscriber/.claude/rules/dna/

      - name: Copy DNA commands to subscriber
        run: |
          mkdir -p subscriber/.claude/commands/dna/
          if compgen -G "$GITHUB_WORKSPACE/dna/.claude-static/commands/*" > /dev/null 2>&1; then
            cp -r $GITHUB_WORKSPACE/dna/.claude-static/commands/. subscriber/.claude/commands/dna/
          fi

      - name: Copy DNA scripts to subscriber
        run: |
          if compgen -G "$GITHUB_WORKSPACE/dna/.claude-static/scripts/*" > /dev/null 2>&1; then
            mkdir -p subscriber/.claude/scripts/
            cp -r $GITHUB_WORKSPACE/dna/.claude-static/scripts/. subscriber/.claude/scripts/
          fi

      - name: Write DNA distribution READMEs
        env:
          RULES_README: |
            # DNA Rules — Distributed Package

            This folder is managed by [NXD-Solutions/dna](https://github.com/NXD-Solutions/dna).

            **Do not edit files here directly.** Changes made in this folder will be overwritten on the next distribution run. All changes must be made in `NXD-Solutions/dna` and distributed via the `Distribute Claude Config` workflow in `NXD-Solutions/.github`.
          COMMANDS_README: |
            # DNA Commands — Distributed Package

            This folder is managed by [NXD-Solutions/dna](https://github.com/NXD-Solutions/dna).

            **Do not edit files here directly.** Changes made in this folder will be overwritten on the next distribution run. All changes must be made in `NXD-Solutions/dna` and distributed via the `Distribute Claude Config` workflow in `NXD-Solutions/.github`.
        run: |
          printf '%s' "$RULES_README" > subscriber/.claude/rules/dna/README.md
          printf '%s' "$COMMANDS_README" > subscriber/.claude/commands/dna/README.md

      - name: Copy PR template
        run: |
          mkdir -p subscriber/.github/
          cp $GITHUB_WORKSPACE/.github/PULL_REQUEST_TEMPLATE.md subscriber/.github/PULL_REQUEST_TEMPLATE.md

      - name: Check for changes
        id: changes
        run: |
          if [ -z "$(git -C subscriber status --porcelain -- .claude/rules/ .claude/commands/ .claude/scripts/ .github/PULL_REQUEST_TEMPLATE.md)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✅ \`${{ matrix.repo }}\` — already up to date." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR if changed
        if: steps.changes.outputs.changed == 'true'
        id: open-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.REPOS_PAT }}
          path: subscriber
          branch: automated/update-ai-coding-rules
          base: main
          delete-branch: true
          add-paths: |
            .claude/rules/
            .claude/commands/
            .claude/scripts/
            .github/PULL_REQUEST_TEMPLATE.md
          commit-message: "Update AI coding rules from NXD-Solutions/dna"
          title: "automated: Update AI coding rules from NXD-Solutions/dna"
          body: |
            Auto-generated by the **Distribute Claude Config** workflow in `NXD-Solutions/.github`.

            Syncs `.claude/rules/dna/`, `.claude/commands/dna/`, and `.claude/scripts/` from `NXD-Solutions/dna`, removes old distribution paths, and updates `.github/PULL_REQUEST_TEMPLATE.md`.

            Review the diff and merge.
          labels: chore

      - name: Report PR to summary
        if: steps.open-pr.outputs.pull-request-url != ''
        run: echo "${{ steps.open-pr.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"
