# Central registry of repositories that receive automatic decision sync PRs.
#
# Organised by role — each key matches an "## AI Summary — <role>" heading in Confluence.
# Repos listed under a role receive a PR updating .claude/rules/decisions-<role>.md
# whenever the NXD Decision Log changes.
#
# To register a new subscriber, append its repo under the appropriate role:
#   Developer:
#     - NXD-Solutions/<repo-name>

subscriptions:
  Developer:
    - NXD-Solutions/prototype
    - NXD-Solutions/landing-page